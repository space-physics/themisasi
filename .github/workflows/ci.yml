name: ci

on:
  push:
    paths:
    - "**/*.py"

jobs:

  core:

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os}}

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - run: pip install .[tests,lint]

    - run: flake8
    - run: mypy

    - run: pytest
